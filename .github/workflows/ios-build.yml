name: iOS Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build iOS app (Simulator)
        shell: bash
        run: |
          set +e
          set -o pipefail
          xcodebuild \
            -project "Stable Action.xcodeproj" \
            -target "Stable Action" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee xcodebuild.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::group::xcodebuild errors"
            grep -n "error:" xcodebuild.log | tail -n 20 || true
            echo "::endgroup::"
            first_error=$(grep -m1 "error:" xcodebuild.log || echo "xcodebuild failed with exit code $status")
            echo "::error title=xcodebuild failed::$first_error"
            exit "$status"
          fi
