name: iOS Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build iOS app (Simulator)
        shell: bash
        run: |
          set +e
          set -o pipefail
          xcodebuild \
            -project "Stable Action.xcodeproj" \
            -target "Stable Action" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee xcodebuild.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::group::xcodebuild errors"
            grep -n "error:" xcodebuild.log | tail -n 20 || true
            echo "::endgroup::"
            first_error=$(grep -m1 "error:" xcodebuild.log || echo "xcodebuild failed with exit code $status")
            echo "::error title=xcodebuild failed::$first_error"
            exit "$status"
          fi

      - name: Archive iOS app (Device, unsigned)
        shell: bash
        run: |
          set +e
          set -o pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/StableAction.xcarchive"
          xcodebuild \
            -project "Stable Action.xcodeproj" \
            -scheme "Stable Action" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive 2>&1 | tee xcodearchive.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::group::xcodearchive errors"
            grep -n "error:" xcodearchive.log | tail -n 30 || true
            echo "::endgroup::"
            first_error=$(grep -m1 "error:" xcodearchive.log || echo "xcode archive failed with exit code $status")
            echo "::error title=xcode archive failed::$first_error"
            exit "$status"
          fi

      - name: Package IPA (unsigned)
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/StableAction.xcarchive"
          APP_PATH="$(find "$ARCHIVE_PATH/Products/Applications" -maxdepth 1 -type d -name "*.app" | head -n 1)"
          if [ -z "${APP_PATH:-}" ]; then
            echo "::error title=IPA packaging failed::No .app found in archive."
            exit 1
          fi
          rm -rf "$RUNNER_TEMP/Payload"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/Payload/"
          (
            cd "$RUNNER_TEMP"
            zip -qry "StableAction-unsigned.ipa" "Payload"
          )
          mkdir -p artifacts
          cp "$RUNNER_TEMP/StableAction-unsigned.ipa" artifacts/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: artifacts/StableAction-unsigned.ipa
          if-no-files-found: error

      - name: Publish IPA To Rolling Release
        if: github.event_name != 'pull_request'
        uses: ncipollo/release-action@v1
        with:
          tag: ci-latest
          name: Stable Action CI Latest (iOS 15+)
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          artifacts: artifacts/StableAction-unsigned.ipa
          body: |
            Auto-generated unsigned IPA from the latest successful CI build.

            Compatibility notes:
            - Deployment target: iOS 15.0
            - Roll stabilization uses continuous angle unwrapping to avoid rotation jumps.
            - iOS 15-safe APIs are used for thumbnail generation and tap handling.

            Commit: ${{ github.sha }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  cleanup:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Delete older workflow runs (keep latest 5)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflowId = context.workflow;
            const keep = 5;

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              {
                owner,
                repo,
                per_page: 100,
                status: "completed"
              }
            );

            const sameWorkflow = runs
              .filter(run => run.name === workflowId)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const candidates = sameWorkflow.filter(run => run.id !== context.runId);
            const toDelete = candidates.slice(keep - 1);

            core.info(`Found ${sameWorkflow.length} completed runs for workflow "${workflowId}".`);
            core.info(`Keeping latest ${keep}; deleting ${toDelete.length}.`);

            for (const run of toDelete) {
              await github.rest.actions.deleteWorkflowRun({
                owner,
                repo,
                run_id: run.id
              });
              core.info(`Deleted run ${run.id} (${run.head_sha})`);
            }
